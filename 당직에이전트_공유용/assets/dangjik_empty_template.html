<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>당직표 빈 양식</title>
  <style>
    body {
      margin: 24px;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      color: #111;
      line-height: 1.5;
    }

    .page {
      width: 1200px;
    }

    .mail-copy {
      margin: 0 0 24px;
      font-size: 22px;
      line-height: 1.6;
      white-space: pre-line;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    h2 {
      margin: 48px 0 12px;
      font-size: 28px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      border: 1px solid #a9a9a9;
      padding: 12px 10px;
      font-size: 18px;
      vertical-align: middle;
      word-break: keep-all;
    }

    th {
      background: #d9ead3;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
    }

    .summary td {
      font-size: 20px;
      text-align: center;
    }

    .site {
      width: 17%;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
    }

    .worker {
      width: 8%;
      font-size: 20px;
      text-align: center;
    }

    .status {
      width: 57%;
      font-size: 18px;
      line-height: 1.45;
      vertical-align: top;
    }

    .note {
      width: 10%;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
    }

    .pending td {
      color: #9a9a9a;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="mail-copy">총괄CEO님께,

{월}월 {일}일 당직 결과를 아래와 같이 보고 드립니다.
<strong><u>전 사업장 특이사항 없습니다.</u></strong>


=== 아 래 ===</div>
    <h1>1. 당직자 근무현황</h1>
    <table class="summary">
      <thead>
        <tr>
          <th style="width: 28%;">당직일자</th>
          <th style="width: 20%;">근무시간</th>
          <th style="width: 23%;">근무자</th>
          <th style="width: 29%;">근무 장소</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>{{당직일자}}</td>
          <td>{{근무시간}}</td>
          <td>{{근무자}}</td>
          <td>{{근무장소}}</td>
        </tr>
      </tbody>
    </table>

    <h2>2. 사업장별 근무현황</h2>
    <table>
      <thead>
        <tr>
          <th style="width: 17%;">사업장</th>
          <th style="width: 8%;">당직자</th>
          <th style="width: 65%;">근무 현황</th>
          <th style="width: 10%;">특이사항</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="site">수서 본사</td>
          <td class="worker">{{당직자}}</td>
          <td class="status">{{근무 현황}}</td>
          <td class="note">{{특이사항}}</td>
        </tr>
        <tr class="pending">
          <td class="site">음성두부</td>
          <td class="worker"></td>
          <td class="status"></td>
          <td class="note"></td>
        </tr>
        <tr class="pending">
          <td class="site">음성생면</td>
          <td class="worker"></td>
          <td class="status"></td>
          <td class="note"></td>
        </tr>
        <tr class="pending">
          <td class="site">음성나물</td>
          <td class="worker"></td>
          <td class="status"></td>
          <td class="note"></td>
        </tr>
        <tr class="pending">
          <td class="site">춘천두부/얼음</td>
          <td class="worker"></td>
          <td class="status"></td>
          <td class="note"></td>
        </tr>
        <tr class="pending">
          <td class="site">의령두부/에프에프</td>
          <td class="worker"></td>
          <td class="status"></td>
          <td class="note"></td>
        </tr>
        <tr class="pending">
          <td class="site">글로벌김치</td>
          <td class="worker"></td>
          <td class="status"></td>
          <td class="note"></td>
        </tr>
        <tr class="pending">
          <td class="site">신선나또</td>
          <td class="worker"></td>
          <td class="status"></td>
          <td class="note"></td>
        </tr>
        <tr class="pending">
          <td class="site">도안녹즙</td>
          <td class="worker"></td>
          <td class="status"></td>
          <td class="note"></td>
        </tr>
        <tr class="pending">
          <td class="site">음성물류</td>
          <td class="worker"></td>
          <td class="status"></td>
          <td class="note"></td>
        </tr>
      </tbody>
    </table>
    <div class="mail-copy" style="margin: 24px 0 0;">이상입니다.
{{발신자명}} 드림</div>
  </div>
</body>
</html>
